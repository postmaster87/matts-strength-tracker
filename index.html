<style>
:root{
  --navy:#1F3864; --navy-deep:#16294A; --navy-tint:#D6E0F0;
  --gold:#C9A84C; --gold-ink:#8A6D1F; --gold-tint:#FDF3DC;
  --teal:#2E9DAD; --teal-ink:#1E6E7A; --teal-tint:#E3F2F4;
  --warm-tint:#E8F4D6; --warm-ink:#1A4000;
  --bg:#F1F2F5; --card:#FFFFFF; --card-alt:#F8FAFA; --line:#DDE1E8;
  --ink:#1A1A1A; --muted:#555555; --faint:#8A8F99;
  --danger:#B3402F;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
  font-family:'Barlow',system-ui,-apple-system,sans-serif; font-size:16px;}
body{min-height:100vh; padding-bottom:60px;}
.cond{font-family:'Barlow Condensed','Barlow',sans-serif;}

/* ---------- Lock screen ---------- */
#lock{position:fixed; inset:0; background:var(--navy); z-index:100;
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center;}
#lock .brand{font-family:'Barlow Condensed'; font-weight:700; font-size:15px; letter-spacing:.22em;
  color:var(--gold); text-transform:uppercase; margin-bottom:8px;}
#lock h1{font-family:'Barlow Condensed'; font-weight:600; font-size:34px; margin:0 0 6px; letter-spacing:.02em; color:#fff;}
#lock p{color:#B9C4DA; margin:0 0 28px; max-width:320px; line-height:1.45;}
.pin-dots{display:flex; gap:14px; margin-bottom:26px; height:16px;}
.pin-dots span{width:14px; height:14px; border-radius:50%; border:1.5px solid #5A6C92; transition:all .12s;}
.pin-dots span.on{background:var(--gold); border-color:var(--gold);}
.pad{display:grid; grid-template-columns:repeat(3,76px); gap:12px;}
.pad button{height:64px; border-radius:16px; border:1px solid #33487A; background:var(--navy-deep);
  color:#fff; font-family:'Barlow Condensed'; font-size:26px; font-weight:600; cursor:pointer;}
.pad button:active{background:#0F1D38; transform:scale(.96);}
.pad button.ghost{border:none; background:transparent; font-size:15px; color:#B9C4DA; font-family:'Barlow';}
#lockMsg{height:20px; margin-top:16px; font-size:14px; color:#FFB4A6;}
#lockMsg.ok{color:#BFE8C6;}

/* ---------- Header ---------- */
header{position:sticky; top:0; z-index:50; background:var(--navy);
  padding:12px 14px 12px; box-shadow:0 2px 10px rgba(22,41,74,.25);}
.topline{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px;}
.topline .brand{font-family:'Barlow Condensed'; font-weight:700; font-size:13px; letter-spacing:.2em;
  color:var(--gold); text-transform:uppercase;}
#saveState{font-size:12px; color:#8FA0C4; transition:color .2s;}
#syncBtn{padding:4px 12px; border-radius:999px; border:1px solid var(--gold); background:transparent;
  color:var(--gold); font-family:'Barlow Condensed'; font-weight:600; font-size:13px; letter-spacing:.06em; cursor:pointer;}
#syncBtn.on{background:var(--gold); color:var(--navy-deep);}
#saveState.saving{color:var(--gold);}
#saveState.saved{color:#BFE8C6;}

.seg{display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px;}
.seg::-webkit-scrollbar{display:none;}
.seg button{flex:0 0 auto; padding:10px 16px; border-radius:999px; border:1px solid #3A5088;
  background:var(--navy-deep); color:#B9C4DA; font-family:'Barlow Condensed'; font-weight:600;
  font-size:17px; letter-spacing:.04em; cursor:pointer; white-space:nowrap;}
.seg button.on{background:var(--gold); border-color:var(--gold); color:var(--navy-deep);}
.seg.small{margin-top:8px;}
.seg.small button{font-size:15px; padding:9px 14px;}

/* ---------- Week scorecard chips ---------- */
.weeks{display:grid; gap:8px; padding:12px 14px 4px;}
.weeks.c4{grid-template-columns:repeat(4,1fr);}
.weeks.c2{grid-template-columns:repeat(2,1fr);}
.wk{border:1px solid var(--line); background:var(--card); border-radius:12px;
  padding:9px 4px 7px; text-align:center; cursor:pointer; position:relative;}
.wk .n{font-family:'Barlow Condensed'; font-weight:700; font-size:19px; letter-spacing:.03em; color:var(--muted);}
.wk .d{font-size:11.5px; color:var(--faint); margin-top:1px;}
.wk.on{border-color:var(--teal); background:var(--teal);}
.wk.on .n{color:#fff;}
.wk.on .d{color:#DFF3F6;}
.wk .dot{position:absolute; top:6px; right:7px; width:6px; height:6px; border-radius:50%; background:var(--gold);}
.wk.on .dot{background:#fff;}

/* ---------- Session body ---------- */
main{padding:6px 14px 30px;}
.sessTitle{font-family:'Barlow Condensed'; font-weight:600; font-size:22px; letter-spacing:.02em;
  margin:10px 2px 2px; color:var(--navy);}
.sessSub{font-size:13px; color:var(--muted); margin:0 2px 6px;}
.dateRow{display:flex; align-items:center; gap:10px; margin:8px 2px 14px;}
.dateRow label{font-size:13px; color:var(--muted);}
.dateRow input{width:110px;}

.grp{font-family:'Barlow Condensed'; font-weight:700; font-size:14px; letter-spacing:.16em;
  text-transform:uppercase; margin:22px 0 8px; padding:7px 12px; border-radius:8px;}
.g-warm{background:var(--warm-tint); color:var(--warm-ink);}
.g-str{background:var(--navy); color:#fff;}
.g-core{background:var(--gold-tint); color:var(--gold-ink);}
.g-acc{background:var(--teal-tint); color:var(--teal-ink);}
.g-cool{background:var(--navy-tint); color:var(--navy);}

.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  padding:12px 12px 12px; margin-bottom:10px; box-shadow:0 1px 2px rgba(22,41,74,.05);}
.card .nm{font-weight:600; font-size:16.5px; line-height:1.25; color:var(--ink);}
.card .meta{display:flex; gap:8px; flex-wrap:wrap; margin:5px 0 9px;}
.tag{font-family:'Barlow Condensed'; font-weight:600; font-size:13.5px; letter-spacing:.04em;
  padding:2px 9px; border-radius:6px; background:var(--card-alt); color:var(--muted); border:1px solid var(--line);}
.tag.tempo{color:var(--teal-ink); background:var(--teal-tint); border-color:#C4E2E7;}
.last{display:flex; align-items:baseline; gap:8px; margin:0 0 9px; padding:8px 10px;
  background:var(--gold-tint); border:1px solid #EEDFB4; border-radius:9px;}
.last .lbl{font-family:'Barlow Condensed'; font-weight:700; font-size:12px; letter-spacing:.14em; color:var(--gold-ink); flex:0 0 auto;}
.last .val{font-size:15px; color:var(--ink); line-height:1.3; overflow-wrap:anywhere;}
input[type=text], textarea{
  width:100%; background:#fff; border:1px solid #C9D0DA; border-radius:10px;
  color:var(--ink); font-family:'Barlow'; font-size:16px; padding:12px;
  outline:none;}
input[type=text]:focus, textarea:focus{border-color:var(--teal); box-shadow:0 0 0 2px var(--teal-tint);}
input::placeholder, textarea::placeholder{color:var(--faint);}
textarea{resize:vertical; min-height:64px;}
.histToggle{margin-top:8px; background:none; border:none; color:var(--teal-ink); font-size:13px; cursor:pointer; padding:2px;}
.hist{margin-top:6px; font-size:13.5px; color:var(--muted); line-height:1.6; display:none;}
.hist b{color:var(--gold-ink); font-family:'Barlow Condensed'; letter-spacing:.05em; font-weight:600;}
.hist.open{display:block;}

.footcards{margin-top:26px;}
.footcards .card .nm{color:var(--navy);}

/* ---------- Gates ---------- */
.gateCard{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  padding:14px; margin:14px 0; box-shadow:0 1px 2px rgba(22,41,74,.05);}
.gateCard h3{font-family:'Barlow Condensed'; font-weight:600; font-size:20px; margin:0 0 2px; color:var(--navy);}
.gateCard .sub{font-size:13px; color:var(--muted); margin-bottom:12px;}
.crit{display:flex; align-items:center; gap:10px; padding:9px 0; border-top:1px solid var(--line);}
.crit .cn{flex:1; font-size:14.5px; line-height:1.3;}
.crit .th{font-family:'Barlow Condensed'; font-weight:600; font-size:15px; color:var(--teal-ink); flex:0 0 auto;}
.crit input{flex:0 0 92px; padding:9px 10px; font-size:15px; text-align:center;}
.gateMeta{margin-top:12px; display:grid; gap:8px;}
.gateMeta label{font-size:13px; color:var(--muted); display:block; margin-bottom:3px;}

.note{font-size:12.5px; color:var(--faint); text-align:center; margin:26px 12px 0; line-height:1.5;}

/* ---------- Floating Done button (drops the keyboard) ---------- */
#doneBtn{position:fixed; right:12px; bottom:12px; z-index:90; display:none;
  padding:12px 22px; border-radius:999px; border:none; cursor:pointer;
  background:var(--navy); color:var(--gold);
  font-family:'Barlow Condensed'; font-weight:700; font-size:17px; letter-spacing:.12em; text-transform:uppercase;
  box-shadow:0 4px 14px rgba(22,41,74,.35);}
#doneBtn:active{transform:scale(.95);}
</style>
</head>

  <main id="main"></main>

/* ================= STATE / STORAGE ================= */
const STORE_KEY = "ovs-matt-tracker-v1";
/* Dual-mode persistence:
   - Published Claude artifact -> window.storage (cloud, shared with OV)
   - Netlify / any other host  -> localStorage (saved on this device only) */
const CLOUD = typeof window.storage !== "undefined" && window.storage && typeof window.storage.get === "function";
const store = {
  async get(k){
    if(CLOUD){ return await window.storage.get(k, true); }
    const v = localStorage.getItem(k);
    return v ? {key:k, value:v} : null;
  },
  async set(k,v){
    if(CLOUD){ return await window.storage.set(k, v, true); }
    localStorage.setItem(k, v);
    return {key:k, value:v};
  }
};
let DATA = null;          // {pin, vals:{...}, dates:{...}}
let ui = {phase:0, sess:0, week:{}, tab:"program"}; // week keyed by phase.sess
let saveTimer=null;

async function loadData(){
  try{ const r = await store.get(STORE_KEY);
    if(r && r.value){
      DATA = JSON.parse(r.value);
      // Migration: when the program file is updated with newly seeded history
      // (e.g. OV's Phase 3 revision), fill in any SEED keys this device doesn't
      // have yet. Never overwrites anything the user has entered.
      let added=false;
      for(const k in SEED){ if(DATA.vals[k]===undefined){ DATA.vals[k]=SEED[k]; added=true; } }
      if(added){ try{ store.set(STORE_KEY, JSON.stringify(DATA)).catch(()=>{}); }catch(e){} }
      return true;
    } }catch(e){}
  return false;
}
function scheduleSave(){
  const el=document.getElementById("saveState");
  el.textContent="Saving…"; el.className="saving";
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    try{ await store.set(STORE_KEY, JSON.stringify(DATA));
      pushCloud();
      el.textContent=CLOUD?"Saved":(fbUser?"Saved + synced":"Saved (this device)"); el.className="saved";
      setTimeout(()=>{el.textContent="·";el.className="";},1500);
    }catch(e){ el.textContent="Save failed — check connection"; el.className="saving"; }
  },700);
}
function val(k){ return (DATA.vals && DATA.vals[k]) || ""; }
function setVal(k,v){ DATA.vals[k]=v; scheduleSave(); }
function getDate(p,s,w){ const k=`d.${p}.${s}.${w}`;
  if(DATA.vals[k]!==undefined) return DATA.vals[k];
  const ph=PROGRAM.find(x=>x.id===p); const se=ph.sessions.find(x=>x.id===s);
  return se.dates[w]||""; }

let pinBuf="", pinMode="enter"; // enter | create | confirm
let pinFirst="";
function drawPad(){
  const pad=document.getElementById("pad"); pad.innerHTML="";
  ["1","2","3","4","5","6","7","8","9","clear","0","del"].forEach(k=>{
    const b=document.createElement("button");
    if(k==="clear"){b.textContent="Clear";b.className="ghost";}
    else if(k==="del"){b.textContent="⌫";b.className="ghost";b.style.fontSize="22px";}
    else b.textContent=k;
    b.onclick=()=>keyPress(k); pad.appendChild(b);
  });
}
function drawDots(){ const d=document.getElementById("pinDots").children;
  for(let i=0;i<4;i++) d[i].className = i<pinBuf.length?"on":""; }
function keyPress(k){
  const msg=document.getElementById("lockMsg");
  if(k==="clear"){pinBuf="";drawDots();return;}
  if(k==="del"){pinBuf=pinBuf.slice(0,-1);drawDots();return;}
  if(pinBuf.length>=4) return;
  pinBuf+=k; drawDots();
  if(pinBuf.length===4){
    if(pinMode==="enter"){
      if(pinBuf===DATA.pin){ unlock(); }
      else{ msg.textContent="Wrong PIN"; msg.className=""; pinBuf=""; setTimeout(drawDots,250); }
    } else if(pinMode==="create"){
      pinFirst=pinBuf; pinBuf=""; pinMode="confirm";
      document.getElementById("lockSub").textContent="Re-enter the same PIN to confirm";
      msg.textContent=""; setTimeout(drawDots,150);
    } else { // confirm
      if(pinBuf===pinFirst){
        DATA={pin:pinBuf, vals:Object.assign({},SEED)};
        try{ store.set(STORE_KEY, JSON.stringify(DATA)).catch(()=>{}); }catch(e){}
        msg.textContent="PIN set"; msg.className="ok";
        setTimeout(unlock,350);
      } else {
        msg.textContent="Didn't match — start over"; msg.className="";
        pinBuf=""; pinFirst=""; pinMode="create";
        document.getElementById("lockSub").textContent="Create a 4-digit PIN";
        setTimeout(drawDots,250);
      }
    }
  }
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");}

function grpClass(name){
  const n=name.toLowerCase();
  if(n.includes("warmup")) return "g-warm";
  if(n.includes("strength")||n.includes("power")) return "g-str";
  if(n.includes("core")) return "g-core";
  if(n.includes("accessory")||n.includes("prehab")||n.includes("monitoring")) return "g-acc";
  return "g-cool";
}

/* Auto-insert the slash while typing a m/d date */
function fmtDate(el){
  let v=el.value;
  if(v.includes("/")){ // user typed their own slash — just tidy it
    const parts=v.replace(/[^\d/]/g,"").split("/");
    el.value=parts[0].slice(0,2)+"/"+parts.slice(1).join("").slice(0,2);
    return;
  }
  const d=v.replace(/\D/g,"").slice(0,4);
  if(d.length>=2){
    if(d[0]>"1") el.value=d[0]+"/"+d.slice(1,3);       // 5 -> 5/19
    else el.value=d.slice(0,2)+"/"+d.slice(2,4);       // 12 -> 12/01
  } else el.value=d;
}

/* ================= DONE BUTTON (keyboard dismiss) ================= */
(function(){
  const btn=document.getElementById("doneBtn");
  if(!btn) return;
  function isField(el){ return el && (el.tagName==="INPUT"||el.tagName==="TEXTAREA"); }
  // Keep the button floating just above the on-screen keyboard
  function place(){
    const vv=window.visualViewport;
    if(vv){
      const lift=window.innerHeight - vv.height - vv.offsetTop;
      btn.style.transform="translateY(-"+Math.max(0,lift)+"px)";
    }
  }
  if(window.visualViewport){
    window.visualViewport.addEventListener("resize",place);
    window.visualViewport.addEventListener("scroll",place);
  }
  document.addEventListener("focusin",e=>{
    if(isField(e.target)){ btn.style.display="block"; place(); }
  });
  document.addEventListener("focusout",()=>{
    // small delay so a Done tap isn't cancelled by the hide
    setTimeout(()=>{ if(!isField(document.activeElement)) btn.style.display="none"; },120);
  });
  // pointerdown + preventDefault: fires before the input loses focus,
  // so one tap reliably commits the entry and drops the keyboard
  btn.addEventListener("pointerdown",e=>{
    e.preventDefault();
    const a=document.activeElement;
    if(isField(a)){ a.blur(); }   // blur fires the field's onchange -> autosave
    btn.style.display="none";
    btn.style.transform="";
  });
})();

/* ================= FIREBASE CLOUD SYNC =================
   Fill these in from Firebase console -> Project settings -> your web app.
   Until every PASTE_ placeholder is replaced, sync stays off and the app
   runs local-only. The PIN remains a per-device lock; Google sign-in is
   the real security for the shared cloud log. */
const firebaseConfig = {
  apiKey: "PASTE_API_KEY",
  authDomain: "PASTE_PROJECT_ID.firebaseapp.com",
  projectId: "PASTE_PROJECT_ID",
  storageBucket: "PASTE_PROJECT_ID.appspot.com",
  messagingSenderId: "PASTE_SENDER_ID",
  appId: "PASTE_APP_ID"
};
const SHARED_DOC = ["trackers","matt-strength"]; // one shared log: Matt + OV

let fbUser=null, fbDoc=null, fbUnsub=null;
const FB_READY = typeof firebase!=="undefined" && !CLOUD && firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("PASTE_");

function syncUI(){
  const b=document.getElementById("syncBtn");
  if(!b) return;
  if(!FB_READY){ b.style.display="none"; return; }
  b.style.display="inline-block";
  if(fbUser){ b.className="on"; b.textContent="Sync: "+(fbUser.displayName||"on").split(" ")[0]; }
  else{ b.className=""; b.textContent="Sync off — sign in"; }
}
function initFirebase(){
  if(!FB_READY) return;
  firebase.initializeApp(firebaseConfig);
  fbDoc = firebase.firestore().collection(SHARED_DOC[0]).doc(SHARED_DOC[1]);
  firebase.auth().onAuthStateChanged(u=>{
    fbUser=u; syncUI();
    if(fbUnsub){ fbUnsub(); fbUnsub=null; }
    if(u && DATA){
      pushCloud(); // upload this device's log first (merge, never wipes)
      fbUnsub = fbDoc.onSnapshot(snap=>{
        const d=snap.data();
        if(d && d.vals) applyRemote(d.vals);
      }, err=>{ console.warn("sync read blocked:", err.message);
        const el=document.getElementById("saveState");
        el.textContent="Sync blocked — check Firestore rules / allowed emails"; el.className="saving"; });
    }
  });
  const b=document.getElementById("syncBtn");
  b.onclick=()=>{
    if(fbUser){ if(confirm("Sign out of cloud sync? Data stays saved on this device.")) firebase.auth().signOut(); }
    else firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert("Sign-in failed: "+e.message));
  };
  syncUI();
}
function pushCloud(){
  if(!fbUser || !fbDoc || !DATA) return;
  fbDoc.set({vals: DATA.vals, updated: Date.now(), by: fbUser.email||""}, {merge:true})
    .catch(e=>console.warn("sync write blocked:", e.message));
}
function applyRemote(remoteVals){
  if(!DATA) return;
  let changed=false;
  for(const k in remoteVals){
    if(DATA.vals[k]!==remoteVals[k]){ DATA.vals[k]=remoteVals[k]; changed=true; }
  }
  if(changed){
    try{ store.set(STORE_KEY, JSON.stringify(DATA)).catch(()=>{}); }catch(e){}
    const a=document.activeElement;
    const typing=a && (a.tagName==="INPUT"||a.tagName==="TEXTAREA");
    if(!typing && document.getElementById("app").style.display!=="none") render();
  }
}

  drawPad();

  const found = await loadData();
  if(!found || !DATA || !DATA.pin){
    pinMode="create";
    document.getElementById("lockSub").textContent="First time here — create a 4-digit PIN. You and OV will both use this PIN to open the tracker.";
    if(!DATA) DATA=null;
  } else {
    pinMode="enter";
    document.getElementById("lockSub").textContent="Enter PIN";
  }
})();
</script>
